<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة تهنئة عيد الفطر - Perfection</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-a: #4d9b97;
            --brand-b: #4596cf;
            --bg-soft: #f7fbfd;
            --text-main: #153645;
            --text-muted: #5b6e79;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, var(--brand-a) 0%, var(--brand-b) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.22);
            padding: 28px;
            max-width: 1200px;
            width: 100%;
        }

        .layout {
            display: flex;
            direction: ltr;
            gap: 24px;
            align-items: stretch;
        }

        .preview-panel {
            flex: 1.1;
            min-width: 320px;
            background: var(--bg-soft);
            border-radius: 18px;
            padding: 18px;
            border: 1px solid #e3eef3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            direction: rtl;
        }

        .form-panel {
            flex: 0.9;
            min-width: 280px;
            background: #ffffff;
            border-radius: 18px;
            padding: 26px;
            border: 1px solid #e8ecef;
            display: flex;
            flex-direction: column;
            justify-content: center;
            direction: rtl;
        }

        h1 {
            color: var(--brand-a);
            margin-bottom: 10px;
            font-size: 2em;
            text-align: right;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.05em;
            line-height: 1.6;
            margin-bottom: 22px;
        }

        .label {
            color: var(--text-main);
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 1.05em;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #dce7ee;
            border-radius: 12px;
            font-size: 1.1em;
            font-family: 'Tajawal', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 12px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--brand-a);
            box-shadow: 0 0 0 4px rgba(77, 155, 151, 0.15);
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1.05em;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .generate-btn {
            width: 100%;
            color: #fff;
            background: linear-gradient(135deg, var(--brand-a) 0%, var(--brand-b) 100%);
            margin-bottom: 12px;
        }

        .status {
            color: var(--text-muted);
            min-height: 24px;
            font-size: 0.98em;
        }

        .canvas-wrap {
            width: 100%;
            overflow: hidden;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.16);
            min-height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .actions {
            margin-top: 16px;
            display: none;
            gap: 10px;
            flex-wrap: wrap;
        }

        .actions.active {
            display: flex;
        }

        .download-btn {
            color: #fff;
            background: #1f8d6c;
        }

        .share-btn {
            color: #fff;
            background: #2a7fbf;
        }

        .reset-btn {
            color: #fff;
            background: #59636c;
        }

        .btn-icon {
            width: 22px;
            height: 22px;
            display: none;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .btn-icon svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn-text {
            margin-inline-start: 6px;
        }

        .helper-note {
            margin-top: 12px;
            color: var(--text-muted);
            font-size: 0.92em;
        }

        @media (max-width: 960px) {
            .layout {
                flex-direction: column;
            }

            .preview-panel,
            .form-panel {
                min-width: 0;
            }

            h1 {
                text-align: center;
                font-size: 24px;
            }

            .subtitle,
            .label,
            .status,
            .helper-note {
                text-align: center;
            }

            .actions {
                justify-content: center;
                flex-wrap: nowrap;
            }

            .actions button {
                width: 54px;
                height: 54px;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 1.3em;
                border-radius: 14px;
            }

            .actions .btn-icon {
                display: inline-flex;
            }

            .actions .btn-text {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="layout">
            <section class="preview-panel" aria-label="معاينة البطاقة">
                <div class="canvas-wrap">
                    <canvas id="posterCanvas"></canvas>
                </div>
            </section>

            <section class="form-panel" aria-label="إدخال الاسم">
                <h1> بطاقة تهنئة عيد الفطر</h1>
 
                <input type="text" id="nameInput" placeholder="اكتب اسمك هنا..." maxlength="28" />
                <button class="generate-btn" id="generateBtn" onclick="generateCard()">إنشاء البطاقة</button>

                <div class="status" id="status">جار تحميل صورة البطاقة...</div>

                <div class="actions" id="actions">
                    <button class="download-btn" onclick="downloadCard()" aria-label="تحميل البطاقة" title="تحميل البطاقة">
                        <span class="btn-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                                <path d="M12 4v10"></path>
                                <path d="m8 10 4 4 4-4"></path>
                                <path d="M5 19h14"></path>
                            </svg>
                        </span>
                        <span class="btn-text">تحميل البطاقة</span>
                    </button>
                    <button class="share-btn" onclick="shareCard()" aria-label="مشاركة البطاقة" title="مشاركة البطاقة">
                        <span class="btn-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                                <path d="M15 5h4v4"></path>
                                <path d="M10 14 19 5"></path>
                                <path d="M19 13v5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h5"></path>
                            </svg>
                        </span>
                        <span class="btn-text">مشاركة البطاقة</span>
                    </button>
                    <button class="reset-btn" onclick="resetCard()" aria-label="إعادة تعيين" title="إعادة تعيين">
                        <span class="btn-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                                <path d="M3 12a9 9 0 1 0 3-6.7"></path>
                                <path d="M3 4v5h5"></path>
                            </svg>
                        </span>
                        <span class="btn-text">إعادة تعيين</span>
                    </button>
                </div>

            </section>
        </div>
    </div>

    <script defer src="/_vercel/insights/script.js"></script>
    <script>
        const canvas = document.getElementById('posterCanvas');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('nameInput');
        const actions = document.getElementById('actions');
        const statusEl = document.getElementById('status');
        const generateBtn = document.getElementById('generateBtn');
        const posterImage = new Image();
        const NAME_POSITION_X_RATIO = 0.628;
        const NAME_POSITION_Y_RATIO = 0.271;

        let currentName = '';
        let imageReady = false;

        posterImage.onload = function onPosterLoaded() {
            imageReady = true;
            canvas.width = posterImage.width;
            canvas.height = posterImage.height;
            drawPoster('');
            statusEl.textContent = 'اكتب الاسم ثم اضغط على إنشاء البطاقة.';
            generateBtn.disabled = false;
        };

        posterImage.onerror = function onPosterLoadError() {
            imageReady = false;
            statusEl.textContent = 'تعذر تحميل الصورة. تأكد أن ملف eid_elfitr_poster.jpeg موجود بجانب index.html';
            generateBtn.disabled = true;
        };

        // Keep it as a relative path so it works in Vercel and local server.
        posterImage.src = './eid_elfitr_poster.jpeg';
        generateBtn.disabled = true;

        nameInput.addEventListener('keypress', function onEnterPress(event) {
            if (event.key === 'Enter') {
                generateCard();
            }
        });

        function generateCard() {
            if (!imageReady) {
                alert('الصورة لسه ما اتحملتش. جرب مرة تانية بعد ثواني.');
                return;
            }

            const name = nameInput.value.trim();
            if (!name) {
                alert('من فضلك اكتب الاسم أولاً');
                return;
            }

            currentName = name;
            drawPoster(name);
            actions.classList.add('active');
            statusEl.textContent = 'تم إنشاء البطاقة. يمكنك التحميل أو المشاركة الآن.';
        }

        function drawPoster(name) {
            if (!imageReady) {
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(posterImage, 0, 0);

            if (!name) {
                return;
            }

            ctx.fillStyle = '#559191';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            let fontSize = Math.min(canvas.width / 8, 120);
            if (name.length > 15) {
                fontSize = Math.min(canvas.width / 12, 80);
            } else if (name.length > 10) {
                fontSize = Math.min(canvas.width / 10, 100);
            }

            fontSize = Math.max(24, fontSize * 0.7);

            ctx.font = `normal ${fontSize}px Tajawal`;
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;

            const x = canvas.width * NAME_POSITION_X_RATIO;
            const y = canvas.height * NAME_POSITION_Y_RATIO;
            ctx.fillText(name, x, y);

            // Reset shadow so subsequent operations remain predictable.
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        function downloadCard() {
            if (!currentName) {
                alert('من فضلك قم بإنشاء البطاقة أولاً');
                return;
            }

            canvas.toBlob(function onBlobReady(blob) {
                if (!blob) {
                    alert('تعذر تجهيز الصورة للتحميل');
                    return;
                }

                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `eid_card_${currentName}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 'image/jpeg', 0.95);
        }

        function shareCard() {
            if (!currentName) {
                alert('من فضلك قم بإنشاء البطاقة أولاً');
                return;
            }

            canvas.toBlob(function onBlobReady(blob) {
                if (!blob) {
                    alert('تعذر تجهيز الصورة للمشاركة');
                    return;
                }

                const file = new File([blob], `eid_card_${currentName}.jpg`, { type: 'image/jpeg' });

                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({
                        files: [file],
                        title: 'بطاقة تهنئة عيد الفطر',
                        text: `عيد فطر مبارك  ${currentName}`
                    }).catch(function onShareError() {
                        downloadCard();
                    });
                } else {
                    downloadCard();
                    alert('المشاركة المباشرة غير مدعومة على جهازك. تم تحميل الصورة بدلًا من ذلك.');
                }
            }, 'image/jpeg', 0.95);
        }

        function resetCard() {
            currentName = '';
            nameInput.value = '';
            actions.classList.remove('active');
            drawPoster('');
            statusEl.textContent = imageReady
                ? 'تمت إعادة التعيين. اكتب اسمًا جديدًا.'
                : 'جار تحميل صورة البطاقة...';
            nameInput.focus();
        }
    </script>
</body>
</html>
