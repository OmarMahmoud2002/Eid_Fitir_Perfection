<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة تهنئة عيد الأضحى</title>
    <meta property="og:title" content="بطاقة تهنئة عيد الأضحى">
    <meta property="og:description" content="صمم بطاقة تهنئة عيد الأضحى باسمك واختر التصميم المناسب لك.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://cardeid.perfectionsa.com/iconP.png">
    <meta property="og:image:alt" content="بطاقة تهنئة عيد الأضحى من Perfection">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="بطاقة تهنئة عيد الأضحى">
    <meta name="twitter:description" content="صمم بطاقة تهنئة عيد الأضحى باسمك واختر التصميم المناسب لك.">
    <meta name="twitter:image" content="https://cardeid.perfectionsa.com/iconP.png">
    <link rel="icon" href="iconP.png" type="image/png">
    <link rel="apple-touch-icon" href="iconP.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-dark: #12222c;
            --brand-ink: #1c2f3a;
            --brand-gold: #c9a24f;
            --brand-teal: #327f88;
            --panel: #ffffff;
            --panel-soft: #f6f8f8;
            --line: #dde5e4;
            --muted: #66777c;
            --shadow: 0 24px 70px rgba(12, 25, 31, 0.22);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background:
                linear-gradient(135deg, rgba(18, 34, 44, 0.94), rgba(35, 82, 88, 0.86)),
                url('./perfection2D.jpg.jpeg') center/cover fixed;
            color: var(--brand-ink);
        }

        .container {
            width: 100%;
            max-width: 1180px;
            background: rgba(255, 255, 255, 0.97);
            border: 1px solid rgba(255, 255, 255, 0.72);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 22px;
        }

        .layout {
            display: flex;
            direction: ltr;
            gap: 22px;
            align-items: stretch;
        }

        .preview-panel {
            flex: 1.1;
            min-width: 320px;
            direction: rtl;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 14px;
        }

        .canvas-wrap {
            width: 100%;
            overflow: hidden;
            border-radius: 12px;
            background: #101820;
            box-shadow: 0 16px 34px rgba(12, 25, 31, 0.26);
            min-height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .canvas-wrap.transitioning {
            animation: previewFade 0.35s ease-out;
        }

        @keyframes previewFade {
            0% { opacity: 0.45; transform: scale(0.985); }
            100% { opacity: 1; transform: scale(1); }
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .form-panel {
            flex: 0.9;
            min-width: 285px;
            direction: rtl;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-mark {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, var(--brand-dark), var(--brand-teal));
            box-shadow: 0 10px 22px rgba(18, 34, 44, 0.22);
            margin-bottom: 14px;
        }

        .brand-mark img {
            width: 28px;
            height: 36px;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        h1 {
            color: var(--brand-dark);
            margin-bottom: 8px;
            font-size: 2rem;
            line-height: 1.25;
        }

        .subtitle {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .design-selector {
            margin-bottom: 18px;
        }

        .label {
            display: block;
            color: var(--brand-ink);
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 1rem;
        }

        .design-cards {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .design-card {
            position: relative;
            cursor: pointer;
            display: block;
            min-height: 0;
            padding: 0;
            border: 2px solid transparent;
            border-radius: 12px;
            overflow: hidden;
            background: var(--panel-soft);
            aspect-ratio: 3 / 4;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .design-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(18, 34, 44, 0.15);
        }

        .design-card.active {
            border-color: var(--brand-gold);
            box-shadow: 0 14px 28px rgba(201, 162, 79, 0.25);
        }

        .design-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .design-card.active::after {
            content: '';
            position: absolute;
            top: 9px;
            right: 9px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--brand-gold);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
        }

        .design-card.active::before {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 9px;
            width: 26px;
            height: 26px;
            z-index: 1;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid var(--line);
            border-radius: 10px;
            font-size: 1.08rem;
            font-family: 'Tajawal', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 12px;
            color: var(--brand-ink);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--brand-teal);
            box-shadow: 0 0 0 4px rgba(50, 127, 136, 0.14);
        }

        button {
            min-height: 50px;
            padding: 13px 18px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Tajawal', sans-serif;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(12, 25, 31, 0.18);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .generate-btn {
            width: 100%;
            color: #fff;
            background: linear-gradient(135deg, var(--brand-dark), var(--brand-teal));
        }

        .status {
            color: var(--muted);
            min-height: 24px;
            font-size: 0.95rem;
            margin-top: 12px;
        }

        .actions {
            margin-top: 14px;
            display: none;
            gap: 10px;
            flex-wrap: wrap;
        }

        .actions.active {
            display: flex;
        }

        .actions button {
            flex: 1;
            min-width: 118px;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .download-btn { background: #19755f; }
        .share-btn { background: #236f9f; }
        .reset-btn { background: #586169; }

        .btn-icon {
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @media (max-width: 960px) {
            body {
                align-items: flex-start;
            }

            .layout {
                flex-direction: column;
            }

            .preview-panel,
            .form-panel {
                min-width: 0;
            }

            .brand-mark {
                margin-inline: auto;
            }

            h1,
            .subtitle,
            .label,
            .status {
                text-align: center;
            }

            .actions {
                justify-content: center;
                flex-wrap: nowrap;
            }

            .actions button {
                width: 54px;
                height: 54px;
                min-width: 54px;
                padding: 0;
                border-radius: 12px;
            }

            .actions .btn-text {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="layout">
            <section class="preview-panel" aria-label="معاينة البطاقة">
                <div class="canvas-wrap">
                    <canvas id="posterCanvas"></canvas>
                </div>
            </section>

            <section class="form-panel" aria-label="إدخال الاسم واختيار التصميم">
                <!-- <div class="brand-mark" aria-hidden="true">
                    <img src="icon.png" alt="">
                </div> -->
                <h1>بطاقة تهنئة عيد الأضحى</h1>
                <p class="subtitle">اختر التصميم، اكتب الاسم، وجهز بطاقة معايدة أنيقة للمشاركة.</p>

                <div class="design-selector">
                    <label class="label">اختر تصميم البطاقة</label>
                    <div class="design-cards">
                        <button type="button" class="design-card active" data-design="1" onclick="selectDesign(1)" aria-label="اختيار التصميم الأول">
                            <img src="./perfection1D.jpg.jpeg" alt="تصميم عيد الأضحى 1" loading="lazy">
                        </button>
                        <button type="button" class="design-card" data-design="2" onclick="selectDesign(2)" aria-label="اختيار التصميم الثاني">
                            <img src="./perfection2D.jpg.jpeg" alt="تصميم عيد الأضحى 2" loading="lazy">
                        </button>
                    </div>
                </div>

                <label class="label" for="nameInput">الاسم على البطاقة</label>
                <input type="text" id="nameInput" placeholder="اكتب اسمك هنا..." maxlength="28">
                <button class="generate-btn" id="generateBtn" onclick="generateCard()">إنشاء البطاقة</button>

                <div class="status" id="status">جار تحميل صور البطاقات...</div>

                <div class="actions" id="actions">
                    <button class="download-btn" onclick="downloadCard()" aria-label="تحميل البطاقة" title="تحميل البطاقة">
                        <span class="btn-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                                <path d="M12 3v11"></path>
                                <path d="m7 10 5 5 5-5"></path>
                                <path d="M5 21h14"></path>
                            </svg>
                        </span>
                        <span class="btn-text">تحميل</span>
                    </button>
                    <button class="share-btn" onclick="shareCard()" aria-label="مشاركة البطاقة" title="مشاركة البطاقة">
                        <span class="btn-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                                <circle cx="18" cy="5" r="3"></circle>
                                <circle cx="6" cy="12" r="3"></circle>
                                <circle cx="18" cy="19" r="3"></circle>
                                <path d="m8.6 10.7 6.8-4.4"></path>
                                <path d="m8.6 13.3 6.8 4.4"></path>
                            </svg>
                        </span>
                        <span class="btn-text">مشاركة</span>
                    </button>
                    <button class="reset-btn" onclick="resetCard()" aria-label="إعادة تعيين" title="إعادة تعيين">
                        <span class="btn-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                                <path d="M3 12a9 9 0 1 0 3-6.7"></path>
                                <path d="M3 4v5h5"></path>
                            </svg>
                        </span>
                        <span class="btn-text">إعادة تعيين</span>
                    </button>
                </div>
            </section>
        </div>
    </div>

    <script defer src="/_vercel/insights/script.js"></script>
    <script>
        const canvas = document.getElementById('posterCanvas');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('nameInput');
        const actions = document.getElementById('actions');
        const statusEl = document.getElementById('status');
        const generateBtn = document.getElementById('generateBtn');
        const canvasWrap = document.querySelector('.canvas-wrap');

        // غيّر هذه القيم لتعديل مكان ولون الاسم في كل تصميم.
        const designs = {
            1: {
                image: new Image(),
                src: './perfection1D.jpg.jpeg',
                nameX: 0.5,
                nameY: 0.81,
                nameColor: '#ffffff',
                fontRatio: 0.058,
                minFont: 34,
                maxWidth: 0.72,
                // shadowColor: 'rgba(0, 0, 0, 0.62)'
            },
            2: {
                image: new Image(),
                src: './perfection2D.jpg.jpeg',
                nameX: 0.5,
                nameY: 0.53,
                nameColor: '#ffffff',
                fontRatio: 0.055,
                minFont: 34,
                maxWidth: 0.68,
                // shadowColor: 'rgba(0, 0, 0, 0.72)'
            }
        };

        let currentDesign = 1;
        let loadedDesigns = 0;
        let currentName = '';

        Object.keys(designs).forEach(function loadDesign(key) {
            const design = designs[key];
            design.image.onload = function onDesignLoaded() {
                loadedDesigns += 1;
                if (Number(key) === currentDesign) {
                    canvas.width = design.image.width;
                    canvas.height = design.image.height;
                    drawPoster(currentName);
                    generateBtn.disabled = false;
                    statusEl.textContent = 'اختر التصميم، ثم اكتب الاسم واضغط إنشاء البطاقة.';
                }
            };
            design.image.onerror = function onDesignError() {
                statusEl.textContent = 'تعذر تحميل إحدى الصور. تأكد من وجود ملفات perfection داخل المشروع.';
            };
            design.image.src = design.src;
        });

        generateBtn.disabled = true;

        nameInput.addEventListener('keypress', function onEnterPress(event) {
            if (event.key === 'Enter') {
                generateCard();
            }
        });

        function selectDesign(designNumber) {
            if (currentDesign === designNumber) {
                return;
            }

            const design = designs[designNumber];
            if (!design || !design.image.complete) {
                statusEl.textContent = 'جاري تحميل التصميم المختار...';
                return;
            }

            canvasWrap.classList.add('transitioning');
            document.querySelectorAll('.design-card').forEach(function removeActive(card) {
                card.classList.remove('active');
            });
            document.querySelector(`[data-design="${designNumber}"]`).classList.add('active');

            currentDesign = designNumber;
            canvas.width = design.image.width;
            canvas.height = design.image.height;
            drawPoster(currentName);

            setTimeout(function removeTransition() {
                canvasWrap.classList.remove('transitioning');
            }, 350);
        }

        function generateCard() {
            if (loadedDesigns === 0) {
                alert('الصور لسه ما اتحملتش. جرب مرة تانية بعد ثواني.');
                return;
            }

            const name = nameInput.value.trim();
            if (!name) {
                alert('من فضلك اكتب الاسم أولاً.');
                return;
            }

            currentName = name;
            drawPoster(name);
            actions.classList.add('active');
            statusEl.textContent = 'تم إنشاء بطاقة عيد الأضحى. يمكنك التحميل أو المشاركة الآن.';
        }

        function fitTextSize(text, baseSize, minSize, maxWidth) {
            let size = baseSize;
            while (size > minSize) {
                ctx.font = `800 ${size}px 'Tajawal', sans-serif`;
                if (ctx.measureText(text).width <= maxWidth) {
                    break;
                }
                size -= 1;
            }
            return size;
        }

        function drawPoster(name) {
            const design = designs[currentDesign];
            if (!design || !design.image.complete) {
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(design.image, 0, 0);

            if (!name) {
                return;
            }

            const maxTextWidth = canvas.width * design.maxWidth;
            const baseSize = Math.round(canvas.width * design.fontRatio);
            const fontSize = fitTextSize(name, baseSize, design.minFont, maxTextWidth);

            ctx.save();
            ctx.font = `800 ${fontSize}px 'Tajawal', sans-serif`;
            ctx.fillStyle = design.nameColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.direction = 'rtl';
            ctx.shadowColor = design.shadowColor;
            ctx.shadowBlur = 12;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 4;
            ctx.fillText(name, canvas.width * design.nameX, canvas.height * design.nameY);
            ctx.restore();
        }

        function downloadCard() {
            if (!currentName) {
                alert('من فضلك قم بإنشاء البطاقة أولاً.');
                return;
            }

            canvas.toBlob(function onBlobReady(blob) {
                if (!blob) {
                    alert('تعذر تجهيز الصورة للتحميل.');
                    return;
                }

                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `eid_al_adha_card_${currentDesign}_${currentName}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }, 'image/jpeg', 0.95);
        }

        function shareCard() {
            if (!currentName) {
                alert('من فضلك قم بإنشاء البطاقة أولاً.');
                return;
            }

            canvas.toBlob(function onBlobReady(blob) {
                if (!blob) {
                    alert('تعذر تجهيز الصورة للمشاركة.');
                    return;
                }

                const file = new File([blob], `eid_al_adha_${currentName}.jpg`, { type: 'image/jpeg' });
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({
                        files: [file],
                        title: 'بطاقة تهنئة عيد الأضحى',
                        text: `عيد أضحى مبارك
تقبل الله منا ومنكم صالح الأعمال، وأعاد عليكم العيد بالخير واليمن والبركات.
${currentName}`
                    }).catch(function onShareError() {
                        downloadCard();
                    });
                } else {
                    downloadCard();
                    alert('المشاركة المباشرة غير مدعومة على جهازك. تم تحميل الصورة بدلًا من ذلك.');
                }
            }, 'image/jpeg', 0.95);
        }

        function resetCard() {
            currentName = '';
            nameInput.value = '';
            actions.classList.remove('active');
            drawPoster('');
            statusEl.textContent = loadedDesigns > 0
                ? 'تمت إعادة التعيين. اكتب اسمًا جديدًا.'
                : 'جار تحميل صور البطاقات...';
            nameInput.focus();
        }
    </script>
</body>
</html>
